<!-- src/app/pages/login/login.component.html -->
<!-- ─── Página de Login ────────────────────── -->

<div class="login-page">
  <div class="login-card">

    <!-- Encabezado -->
    <div class="login-header">
      <div class="logo-icon">🔐</div>
      <h1>Bienvenido</h1>
      <p>Ingresa tus credenciales para continuar</p>
    </div>

    <!-- Mensaje de error -->
    <div class="alert-error" *ngIf="errorMensaje">
      <span>⚠️</span> {{ errorMensaje }}
    </div>

    <!-- Formulario -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <!-- Campo: Usuario -->
      <div class="form-group">
        <label for="username">👤 Usuario</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="Escribe tu usuario"
          [class.input-error]="f['username'].touched && f['username'].invalid">
        <!-- Mensajes de error del campo -->
        <span class="error-msg"
              *ngIf="f['username'].touched && f['username'].errors?.['required']">
          El usuario es obligatorio
        </span>
        <span class="error-msg"
              *ngIf="f['username'].touched && f['username'].errors?.['minlength']">
          Mínimo 3 caracteres
        </span>
      </div>

      <!-- Campo: Contraseña -->
      <div class="form-group">
        <label for="password">🔑 Contraseña</label>
        <div class="input-with-btn">
          <input
            id="password"
            [type]="mostrarPass ? 'text' : 'password'"
            formControlName="password"
            placeholder="Escribe tu contraseña"
            [class.input-error]="f['password'].touched && f['password'].invalid">
          <button type="button" class="btn-toggle" (click)="toggleMostrarPass()">
            {{ mostrarPass ? "🙈" : "👁️" }}
          </button>
        </div>
        <span class="error-msg"
              *ngIf="f['password'].touched && f['password'].errors?.['required']">
          La contraseña es obligatoria
        </span>
      </div>

      <!-- Botón de submit -->
      <button type="submit" class="btn-login" [disabled]="cargando">
        <span *ngIf="!cargando">Iniciar sesión →</span>
        <span *ngIf="cargando">⏳ Verificando...</span>
      </button>

    </form>
  </div>
</div>
